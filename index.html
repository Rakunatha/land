<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>👁️👄👁️</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }

body {
background: #050508;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
font-family: ‘Share Tech Mono’, monospace;
overflow: hidden;
cursor: none;
user-select: none;
}

.scanlines {
position: fixed; inset: 0;
background: repeating-linear-gradient(
to bottom,
transparent 0px, transparent 2px,
rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px
);
pointer-events: none; z-index: 100;
}
.vignette {
position: fixed; inset: 0;
background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.9) 100%);
pointer-events: none; z-index: 99;
}

#cursor {
position: fixed;
width: 18px; height: 18px;
border: 2px solid #39ff14;
border-radius: 50%;
pointer-events: none;
z-index: 200;
transform: translate(-50%,-50%);
transition: width .15s, height .15s, background .15s;
box-shadow: 0 0 8px #39ff14, 0 0 20px #39ff1466;
}
#cursor.pressed {
width: 36px; height: 36px;
background: #39ff1422;
}

#face {
display: flex;
align-items: center;
justify-content: center;
gap: clamp(8px, 5vw, 60px);
perspective: 800px;
}

.ascii-el {
line-height: 1;
white-space: pre;
transition: filter .12s;
transform-origin: center;
}

.eye-wrap {
font-size: clamp(70px, 18vw, 180px);
filter: drop-shadow(0 0 14px #39ff14) drop-shadow(0 0 36px #39ff1466);
}

.mouth-wrap {
font-size: clamp(80px, 20vw, 200px);
filter: drop-shadow(0 0 14px #ff3c6e) drop-shadow(0 0 36px #ff3c6e66);
transform-origin: center;
}

.ripple {
position: fixed;
border-radius: 50%;
pointer-events: none;
transform: translate(-50%,-50%) scale(0);
animation: rippleOut .6s ease-out forwards;
z-index: 50;
}
@keyframes rippleOut {
to { transform: translate(-50%,-50%) scale(1); opacity: 0; }
}

@keyframes shake {
0%,100% { transform: translate(0,0) rotate(0deg); }
15% { transform: translate(-10px, 5px) rotate(-3deg); }
30% { transform: translate(10px, -5px) rotate(3deg); }
45% { transform: translate(-7px, 7px) rotate(-2deg); }
60% { transform: translate(7px, -4px) rotate(2deg); }
80% { transform: translate(-4px, 3px) rotate(-1deg); }
}
@keyframes spinEye {
0% { transform: rotate(0deg) scale(1); }
50% { transform: rotate(180deg) scale(1.3); }
100% { transform: rotate(360deg) scale(1); }
}
@keyframes squish {
0%,100% { transform: scaleY(1) scaleX(1); }
30% { transform: scaleY(0.55) scaleX(1.4); }
60% { transform: scaleY(1.25) scaleX(0.85); }
}
@keyframes scream {
0%,100% { transform: scale(1) rotate(0deg); }
20% { transform: scale(1.5) rotate(-6deg); }
50% { transform: scale(0.8) rotate(4deg); }
75% { transform: scale(1.3) rotate(-2deg); }
}
@keyframes bounce {
0%,100% { transform: translateY(0); }
40% { transform: translateY(-20px); }
70% { transform: translateY(8px); }
}
@keyframes glitch {
0%,100% { filter: drop-shadow(0 0 14px #39ff14); }
15% { filter: drop-shadow(-4px 0 #ff003c) drop-shadow(4px 0 #00cfff) hue-rotate(90deg); transform: translate(4px,0); }
30% { filter: drop-shadow(0 0 14px #39ff14); transform: translate(-4px,0); }
45% { filter: invert(1) hue-rotate(180deg); transform: translate(2px,0); }
60% { filter: drop-shadow(0 0 14px #39ff14); transform: translate(0,0); }
}

.reaction {
position: fixed;
font-family: ‘Share Tech Mono’, monospace;
font-size: clamp(18px, 3.5vw, 32px);
color: #39ff14;
text-shadow: 0 0 12px #39ff14;
pointer-events: none;
z-index: 80;
animation: floatUp 1s ease-out forwards;
white-space: nowrap;
}
@keyframes floatUp {
0%   { opacity:1; transform:translate(-50%,-50%) scale(1); }
100% { opacity:0; transform:translate(-50%,-160%) scale(1.4); }
}

#hint {
position: fixed;
bottom: 28px;
left: 50%;
transform: translateX(-50%);
color: #39ff1466;
font-size: clamp(10px, 2vw, 13px);
letter-spacing: .3em;
text-transform: uppercase;
animation: fadeHint 4s 1s ease-in-out forwards;
z-index: 90;
text-align: center;
}
@keyframes fadeHint { 0%,70%{opacity:1} 100%{opacity:0} }
</style>

</head>
<body>

<div class="scanlines"></div>
<div class="vignette"></div>
<div id="cursor"></div>

<div id="face">
  <div class="eye-wrap  ascii-el" id="eye-left">👁️</div>
  <div class="mouth-wrap ascii-el" id="mouth">👄</div>
  <div class="eye-wrap  ascii-el" id="eye-right">👁️</div>
</div>

<div id="hint">tap eyes · drag mouth · shake to panic</div>

<script>
const cursor = document.getElementById('cursor');
const face   = document.getElementById('face');
const eyeL   = document.getElementById('eye-left');
const eyeR   = document.getElementById('eye-right');
const mouth  = document.getElementById('mouth');

let mx = innerWidth/2, my = innerHeight/2;
let prevMx = mx, prevMy = my;
let velX = 0, velY = 0, fastCount = 0;
let faceRX = 0, faceRY = 0;
let eyeLX = 0, eyeLY = 0, eyeRX = 0, eyeRY = 0;
let isDown = false, holdInterval = null;
let dragging = false, dragStartY = 0, mouthDragScale = 1;
let lastPanic = 0;
let eyeLState = 0, eyeRState = 0; // 0=normal,animating=1

function lerp(a,b,t){ return a+(b-a)*t; }

// ── Cursor ────────────────────────────────────────────────────────
function setPos(x,y){ mx=x; my=y; cursor.style.left=x+'px'; cursor.style.top=y+'px'; }
document.addEventListener('mousemove', e => setPos(e.clientX,e.clientY));
document.addEventListener('touchmove', e => { e.preventDefault(); setPos(e.touches[0].clientX,e.touches[0].clientY); },{passive:false});

// ── Helpers ───────────────────────────────────────────────────────
function center(el){ const r=el.getBoundingClientRect(); return {x:r.left+r.width/2,y:r.top+r.height/2}; }
function hit(el,x,y){ const r=el.getBoundingClientRect(); return x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom; }

function ripple(x,y,size,col){
  const d=document.createElement('div');
  d.className='ripple';
  d.style.cssText=`left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:${col||'radial-gradient(circle,#39ff1455 0%,transparent 70%)'}`;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),700);
}

const words=['!!','OwO','uwu','OOF','WHY','HEY','lol','bruh','omg','👀','wut'];
const mouths=['😮','😲','😬','🫦','💋','😱'];

function reaction(text,x,y){
  const d=document.createElement('div');
  d.className='reaction';
  d.textContent=text;
  d.style.cssText=`left:${x}px;top:${y}px`;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),1000);
}

// ── Raf loop ──────────────────────────────────────────────────────
function raf(){
  velX = mx - prevMx; velY = my - prevMy;
  prevMx = mx; prevMy = my;
  const speed = Math.sqrt(velX*velX+velY*velY);

  // shake / panic
  if(speed > 28){ fastCount++; } else { fastCount = Math.max(0,fastCount-1); }
  if(fastCount > 6){ triggerPanic(); fastCount=0; }

  // face tilt
  const cx=innerWidth/2, cy=innerHeight/2;
  faceRX = lerp(faceRX, (mx-cx)*0.018, 0.06);
  faceRY = lerp(faceRY, (my-cy)*0.012, 0.06);
  face.style.transform = `rotateY(${faceRX}deg) rotateX(${-faceRY}deg)`;

  // eye tracking
  function eyeTrack(el, ox, oy){
    const c = center(el);
    const dx=mx-c.x, dy=my-c.y;
    const d=Math.sqrt(dx*dx+dy*dy)||1;
    const r = Math.min(d/180,1)*20;
    return { x: lerp(ox,(dx/d)*r,0.1), y: lerp(oy,(dy/d)*r,0.1) };
  }
  if(eyeLState===0){ const o=eyeTrack(eyeL,eyeLX,eyeLY); eyeLX=o.x; eyeLY=o.y; eyeL.style.transform=`translate(${eyeLX}px,${eyeLY}px)`; }
  if(eyeRState===0){ const o=eyeTrack(eyeR,eyeRX,eyeRY); eyeRX=o.x; eyeRY=o.y; eyeR.style.transform=`translate(${eyeRX}px,${eyeRY}px)`; }

  requestAnimationFrame(raf);
}
requestAnimationFrame(raf);

// ── Panic / shake ─────────────────────────────────────────────────
function triggerPanic(){
  const now=Date.now(); if(now-lastPanic<800) return; lastPanic=now;
  face.style.animation='shake .5s ease-out';
  mouth.style.animation='scream .45s ease-out';
  ripple(mx,my,220,'radial-gradient(circle,#ff3c6e55 0%,transparent 70%)');
  reaction(['!!!','AHHHH','STOP','no no','🫨'][Math.floor(Math.random()*5)], mx, my-50);
  setTimeout(()=>{ face.style.animation=''; mouth.style.animation=''; },500);
}

// ── Tap eye ───────────────────────────────────────────────────────
function tapEye(el, stateRef, setRef){
  if(stateRef[0]!==0) return;
  stateRef[0]=1;
  const c=center(el);
  const animations=['spinEye .7s ease-out','squish .5s ease-out','bounce .5s ease-out','glitch .4s ease-out'];
  const texts=['👁','OwO','UwU','😵','wut'];
  const pick=Math.floor(Math.random()*animations.length);
  el.style.animation=animations[pick];
  reaction(texts[pick], c.x, c.y-60);
  ripple(c.x,c.y,140,'radial-gradient(circle,#39ff1466 0%,transparent 70%)');
  setTimeout(()=>{ el.style.animation=''; stateRef[0]=0; },700);
}

const eyeLState2=[0], eyeRState2=[0]; // use array so tapEye can mutate

// ── Tap mouth ────────────────────────────────────────────────────
function tapMouth(){
  const c=center(mouth);
  mouth.style.animation='scream .45s ease-out';
  reaction(mouths[Math.floor(Math.random()*mouths.length)], c.x, c.y-70);
  ripple(c.x,c.y,200,'radial-gradient(circle,#ff3c6e55 0%,transparent 70%)');
  setTimeout(()=>mouth.style.animation='',450);
}

// ── Generic tap ──────────────────────────────────────────────────
function doTap(x,y){
  if(hit(eyeL,x,y)){ tapEye(eyeL,eyeLState2,null); return; }
  if(hit(eyeR,x,y)){ tapEye(eyeR,eyeRState2,null); return; }
  if(hit(mouth,x,y)){ tapMouth(); return; }
  // background tap
  face.style.animation='shake .3s ease-out';
  reaction(words[Math.floor(Math.random()*words.length)], x, y-40);
  ripple(x,y,150);
  setTimeout(()=>face.style.animation='',300);
}

// ── Hold ─────────────────────────────────────────────────────────
function startHold(){
  ripple(mx,my,120);
  holdInterval=setInterval(()=>{
    face.style.animation='shake .2s ease-out';
    reaction('!!',mx+Math.random()*40-20,my-40);
    ripple(mx,my,80);
    setTimeout(()=>face.style.animation='',200);
  },280);
}
function stopHold(){ clearInterval(holdInterval); holdInterval=null; }

// ── Drag (mouth stretch) ─────────────────────────────────────────
function onDragMove(y){
  const dy = y - dragStartY;
  const s = 1 + Math.abs(dy)/250;
  mouthDragScale = dy > 0 ? s : 1/s;
  mouth.style.transform = `scaleY(${mouthDragScale}) scaleX(${1/Math.sqrt(Math.abs(mouthDragScale))})`;
}
function onDragEnd(){
  dragging=false;
  mouth.style.transform='';
  mouthDragScale=1;
}

// ── Mouse ─────────────────────────────────────────────────────────
document.addEventListener('mousedown', e=>{
  isDown=true; dragging=true; dragStartY=e.clientY;
  cursor.classList.add('pressed');
  holdInterval===null && setTimeout(()=>{ if(isDown) startHold(); },320);
});
document.addEventListener('mousemove', e=>{ if(dragging) onDragMove(e.clientY); });
document.addEventListener('mouseup', e=>{
  isDown=false; stopHold(); cursor.classList.remove('pressed');
  const dist=Math.abs(e.clientY-dragStartY);
  onDragEnd();
  if(dist<8) doTap(e.clientX,e.clientY);
});

// ── Touch ──────────────────────────────────────────────────────────
document.addEventListener('touchstart', e=>{
  const t=e.touches[0]; setPos(t.clientX,t.clientY);
  isDown=true; dragging=true; dragStartY=t.clientY;
  cursor.classList.add('pressed');
  setTimeout(()=>{ if(isDown) startHold(); },320);
},{passive:true});
document.addEventListener('touchmove', e=>{
  if(dragging) onDragMove(e.touches[0].clientY);
},{passive:false});
document.addEventListener('touchend', e=>{
  const t=e.changedTouches[0];
  isDown=false; stopHold(); cursor.classList.remove('pressed');
  const dist=Math.abs(t.clientY-dragStartY);
  onDragEnd();
  if(dist<8) doTap(t.clientX,t.clientY);
});
</script>

</body>
</html>
